version: "3"

tasks:
  lint:
    desc: Run linter
    cmds:
      - cargo clippy --all-targets --all-features -- -D warnings

  format:
    desc: Check code formatting
    cmds:
      - cargo fmt --

  build-release:
    desc: Build release version
    cmds:
      - cargo build --release

  test:
    desc: Run tests
    cmds:
      - cargo test

  test-debug:
    desc: Run tests with debug logging
    cmds:
      - RUST_LOG=debug cargo test

  test-trace:
    desc: Run tests with trace logging for parser
    cmds:
      - RUST_LOG=panache::parser=trace cargo test

  test-quiet:
    desc: Run tests quietly (no debug output)
    cmds:
      - RUST_LOG=off cargo test

  docs-preview:
    desc: Preview documentation site locally
    cmds:
      - cd docs && quarto preview --no-browser

  audit:
    desc: Run security audit
    cmds:
      - cargo audit

  deny:
    desc: Run cargo deny to check for vulnerabilities and issues
    cmds:
      - cargo deny check
